<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gửi Người Anh Yêu</title>

    <style>
      /* ========================================================================= */
      /* 1. CSS GIAO DIỆN TỔNG QUAN                                                */
      /* ========================================================================= */
      body {
        margin: 0;
        padding: 0;
        background-color: #fff0f3;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        overflow-x: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      #password-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: #fff0f3;
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .pin-box {
        text-align: center;
        background: #ffffff;
        padding: 35px 25px;
        border-radius: 24px;
        box-shadow: 0 10px 30px rgba(255, 77, 109, 0.15);
        width: 85%;
        max-width: 320px;
      }

      .pin-box h3 {
        color: #ff4d6d;
        margin-top: 0;
        margin-bottom: 20px;
        font-size: 20px;
        font-weight: 600;
      }

      .pin-box input {
        width: 100%;
        padding: 12px;
        border: 2px solid #ffa6c9;
        border-radius: 12px;
        text-align: center;
        font-size: 18px;
        outline: none;
        margin-bottom: 20px;
        box-sizing: border-box;
        color: #ff4d6d;
      }

      .pin-box button {
        background: #ff4d6d;
        color: white;
        border: none;
        padding: 12px;
        font-size: 16px;
        border-radius: 12px;
        cursor: pointer;
        font-weight: bold;
        width: 100%;
      }

      #main-content {
        display: none;
        width: 100%;
        max-width: 480px;
        padding: 20px;
        box-sizing: border-box;
        text-align: center;
        position: relative;
        z-index: 10; /* Đảm bảo thư nằm trên lớp trái tim */
      }

      .love-img {
        width: 150px;
        height: 160px;
        object-fit: cover;
        border-radius: 24px;
        border: 4px solid rgb(240, 240, 240);
        box-shadow: 0 8px 24px rgba(255, 77, 109, 0.2);
        margin: 0 auto 20px auto;
        max-width: 320px;
        display: block;
      }

      .letter-box {
        border: 3px dashed #ff4d6d;
        background-color: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        padding: 25px 20px;
        box-shadow: 0 10px 25px rgba(255, 77, 109, 0.1);
        text-align: left;
        box-sizing: border-box;
      }

      #text-container {
        font-size: 16px;
        line-height: 1.7;
        color: #4a4a4a;
        word-wrap: break-word;
        white-space: pre-wrap;
        margin: 0;
      }

      /* ========================================================================= */
      /* CSS CẤU HÌNH HIỆU ỨNG TRÁI TIM RƠI                                         */
      /* ========================================================================= */
      .heart {
        position: fixed;
        top: -20px;
        font-size: 20px;
        color: #ff4d6d;
        pointer-events: none;
        z-index: 1;
        animation: fall linear forwards;
      }

      @keyframes fall {
        to {
          transform: translateY(105vh) translateX(var(--side-distance));
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <!-- MÀN HÌNH KHÓA MÃ PIN -->
    <div id="password-overlay">
      <div class="pin-box">
        <h3>Nhập Mã Số Bí Mật ❤️</h3>
        <input
          type="password"
          id="pin-input"
          pattern="[0-9]*"
          inputmode="numeric"
          placeholder="Nhập mã PIN tại đây..."
        />
        <button onclick="checkPin()">Mở Thư</button>
      </div>
    </div>

    <!-- GIAO DIỆN BỨC THƯ TÌNH YÊU -->
    <div id="main-content">
      <audio id="bg-music" loop preload="auto">
        <source src="audio/Beau.mp3" type="audio/mpeg" />
      </audio>

      <img
        class="love-img"
        src="img/489249722_2869682986545441_4751016861252891252_n.jpg"
        alt="Người yêu"
      />

      <div class="letter-box">
        <p id="text-container"></p>
      </div>
    </div>

    <!-- KỊCH BẢN JAVASCRIPT XỬ LÝ -->
    <script>
      function checkPin() {
        const userInput = document.getElementById("pin-input").value;
        const secretPin = "28032002"; // Thay đổi mã PIN bạn muốn đặt ở đây

        if (userInput === secretPin) {
          document.getElementById("password-overlay").style.display = "none";
          document.getElementById("main-content").style.display = "block";

          const music = document.getElementById("bg-music");
          if (music) {
            music.play().catch(function (error) {
              console.log("Cần tương tác để phát nhạc.");
            });
          }

          typeWriter();

          // BẮT ĐẦU KÍCH HOẠT HIỆU ỨNG TRÁI TIM RƠI
          setInterval(createHeart, 300); // Cứ 300 mili giây (0.3 giây) tạo ra 1 trái tim mới
        } else {
          alert("Sai mã PIN rồi, nhập lại nha người yêu ơi! ❤️");
          document.getElementById("pin-input").value = "";
        }
      }

      // Hàm tạo và làm rơi trái tim ngẫu nhiên
      function createHeart() {
        const heart = document.createElement("div");
        heart.classList.add("heart");

        // Chọn ngẫu nhiên biểu tượng trái tim để sinh động
        const heartTypes = ["❤️", "💖", "💗", "💕", "🌸"];
        heart.innerText =
          heartTypes[Math.floor(Math.random() * heartTypes.length)];

        // Vị trí xuất hiện ngẫu nhiên theo chiều ngang màn hình (0% đến 100%)
        heart.style.left = Math.random() * 100 + "vw";

        // Kích thước trái tim to nhỏ ngẫu nhiên (từ 15px đến 30px)
        heart.style.fontSize = Math.random() * 15 + 15 + "px";

        // Tốc độ rơi nhanh chậm ngẫu nhiên (từ 3 giây đến 6 giây)
        heart.style.animationDuration = Math.random() * 3 + 3 + "s";

        // Độ lệch quỹ đạo bay sang ngang khi rơi xuống (từ -40px đến 40px)
        heart.style.setProperty(
          "--side-distance",
          Math.random() * 80 - 40 + "px",
        );

        document.body.appendChild(heart);

        // Tự động xóa trái tim khỏi mã nguồn sau khi rơi hết màn hình để tránh nặng máy
        setTimeout(() => {
          heart.remove();
        }, 6000);
      }

      const lines = [
        "Chào Em hình bên trên nhé, người mà đã làm cho anh có cảm giác thật khó tả ngay từ lần gặp đầu tiên.",
        "Anh viết bức thư này ngay từ ngày hôm đó rồi và đến hôm nay mới có dịp gửi em...",
        "Em biết không.Hôm nay dù trời có mưa giông hay bão tố thế nào đi nữa thì chắc chắn  bầu trời sẽ sáng trở lại.",
        "Và chúng ta cũng vậy",
        "Đừng để những ngày qua làm cho mình không vui ",
        "Anh không biết tương lai sẽ ra sao...",
        "Nhưng anh biết chắc chắn",
        "Điều chúng ta cần phải làm bây giờ là:",
        "Vui vẻ và thật vui vẻ trong những năm tháng sắp tới.",
        "Cảm ơn Em vì đã xuất hiện và để a thấy được em.",
        "❤️MY LOVE ❤️",
        "19/6/2026",
      ];

      let currentLine = 0;
      let currentChar = 0;
      const textContainer = document.getElementById("text-container");

      function typeWriter() {
        if (currentLine < lines.length) {
          if (currentChar < lines[currentLine].length) {
            textContainer.innerHTML += lines[currentLine].charAt(currentChar);
            currentChar++;
            setTimeout(typeWriter, 100);
          } else {
            textContainer.innerHTML += "\n\n";
            currentLine++;
            currentChar = 0;
            setTimeout(typeWriter, 1000);
          }
        }
      }
    </script>
  </body>
</html>
